name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy
        run: |
          railway up --project 91902995-2399-4ee8-932b-34ea7e588a4d --environment aa70aa31-33f9-44f4-8675-d34d06aa7ace --service=la-mystique-divine --detach
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
